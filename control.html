<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Signage Pro Controller</title>
    <link id="dynamic-font" href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #1e1e1e; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: all 0.3s; border-top: 5px solid transparent; }
        
        .sidebar-left { width: 280px; background: #2d2d2d; padding: 20px; overflow-y: auto; border-right: 1px solid #444; flex-shrink: 0; }
        .main-workspace { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; background: #1a1a1a; }
        .sidebar-right { width: 320px; background: #2d2d2d; padding: 20px; overflow-y: auto; border-left: 1px solid #444; flex-shrink: 0; }
        
        h3 { color: #4CAF50; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        button, select, input { font-family: inherit; width: 100%; padding: 8px; margin-top: 5px; background: #3d3d3d; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; box-sizing: border-box; }
        button.primary { background: #0078D7; font-weight: bold; } button.primary:hover { background: #005A9E; }
        
        .media-item { background: #444; padding: 8px; margin-top: 8px; border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .media-thumb { width: 40px; height: 40px; object-fit: cover; background: #000; flex-shrink: 0; cursor: grab; }
        .media-info { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .media-actions button { width: auto; padding: 4px 8px; margin: 0; font-size: 10px; }
        .btn-del { background: #d32f2f; } .btn-del:hover { background: #b71c1c; }

        .canvas-wrapper { background: #000; position: relative; margin: 20px auto; border: 2px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 5% 5%; }
        .zone-box { position: absolute; border: 2px solid #4CAF50; resize: both; overflow: hidden; display: flex; flex-direction: column; background: #111; }
        .zone-header { background: #4CAF50; color: #000; width: 100%; font-size: 12px; font-weight: bold; cursor: move; padding: 4px 0; text-align: center; position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; box-sizing: border-box; }
        .zone-content { flex-grow: 1; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .zone-content img, .zone-content video { width: 100%; height: 100%; object-fit: fill; position: absolute; top:0; left:0; opacity: 0.4; }
        
        .clock-preview { color: #fff; text-align: center; font-size: 20px; font-weight: bold; z-index: 5; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        
        .zone-playlist-ui { position: absolute; top: 10px; bottom: 10px; left: 10px; right: 10px; overflow-y: auto; z-index: 5; pointer-events: auto; }
        .zone-media-list-item { background: rgba(0,0,0,0.8); border: 1px solid #555; padding: 4px 8px; margin-bottom: 4px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .zone-media-list-item button { width: auto; background: none; border: none; padding: 0; margin: 0; font-size: 12px; }
        .zone-media-list-item button:hover { transform: scale(1.2); }
        .btn-delete-zone { background: #d32f2f; color: white; border: none; font-weight: bold; cursor: pointer; padding: 2px 8px; border-radius: 4px; width: auto; font-size: 10px; }

        .layout-tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab { padding: 8px 15px; background: #333; border-radius: 4px; cursor: pointer; }
        .tab.active { background: #4CAF50; color: #000; font-weight: bold; }
    </style>
    <script>if (sessionStorage.getItem('isAdmin') !== 'true') window.location.href = 'index.html';</script>
</head>
<body>

    <div class="sidebar-left">
        <h3 id="mode-title">1. ตั้งค่าหน้าจอ</h3>
        <label>เลือกจอภาพ / การสั่งการ:</label>
        <select id="screen-select" onchange="loadData()" style="font-weight: bold;">
            <option value="01">Screen 01</option> <option value="02">Screen 02</option>
            <option value="03">Screen 03</option> <option value="04">Screen 04</option>
            <option value="05">Screen 05</option> <option value="06">Screen 06</option>
            <option value="07">Screen 07</option> <option value="08">Screen 08</option>
            <option value="09">Screen 09</option> <option value="10">Screen 10</option>
            <option value="GLOBAL" style="background: #d32f2f; color: #fff;">🚨 โหมดประกาศฉุกเฉิน (ทุกจอ)</option>
        </select>
        
        <label>การวางแนวพรีวิว:</label>
        <select id="orientation-select" onchange="updateCanvas()">
            <option value="landscape">แนวนอน (16:9)</option>
            <option value="portrait">แนวตั้ง (9:16)</option>
        </select>

        <label>แบบอักษร (Google Fonts):</label>
        <select id="font-select" onchange="changeGlobalFont()">
            <option value="Prompt">Prompt (พร้อม)</option>
            <option value="Kanit">Kanit (คณิต)</option>
            <option value="Sarabun">Sarabun (สารบรรณ)</option>
            <option value="Chakra Petch">Chakra Petch (จักเพชร)</option>
            <option value="Bai Jamjuree">Bai Jamjuree (ไบจามจุรี)</option>
            <option value="Mali">Mali (มะลิ)</option>
        </select>

        <div id="btn-normal-mode">
            <button onclick="saveDeploy()" class="primary" style="margin-top: 40px; padding: 15px; background: #4CAF50; font-size:16px;">บันทึก & ส่งขึ้นจอ</button>
        </div>

        <div id="btn-emergency-mode" style="display:none; margin-top: 40px;">
            <button onclick="startEmergency()" style="padding: 15px; background: #d32f2f; color: white; font-weight: bold; font-size:16px; border:none; border-radius:4px; cursor:pointer;">🚨 ถ่ายทอดสด (ทุกจอทันที)</button>
            <button onclick="stopEmergency()" style="padding: 10px; background: #333; color: white; font-weight: bold; border:none; border-radius:4px; cursor:pointer; margin-top:10px;">🛑 ยกเลิกการประกาศ</button>
        </div>

        <button onclick="logout()" style="background: #333; margin-top:10px;">ออกจากระบบ</button>
    </div>

    <div class="main-workspace">
        <h3>2. จัดการ Layouts</h3>
        <div class="layout-tabs" id="tabs-container"></div>
        <button onclick="addLayout()" style="width: auto; padding: 5px 15px;">+ เพิ่ม Layout ใหม่</button>
        
        <div style="margin-top: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button onclick="addZone()" style="width: auto; margin: 0; background: #0078D7; color:#fff;">+ กรอบสื่อ</button>
            <button onclick="addClockZone()" style="width: auto; margin: 0; background: #00bcd4; color:#000;">+ กรอบนาฬิกา</button>
            <button onclick="addMarqueeZone()" style="width: auto; margin: 0; background: #9c27b0; color:#fff;">+ กรอบตัววิ่ง</button>
            <button onclick="addTextZone()" style="width: auto; margin: 0; background: #e91e63; color:#fff;">+ กรอบข้อความ</button>
        </div>

        <div id="canvas" class="canvas-wrapper" style="width: 800px; height: 450px;"></div>
    </div>

    <div class="sidebar-right">
        <h3>3. คลังสื่อ (Media Library)</h3>
        <input type="file" id="file-upload" accept="image/*,video/*">
        <button onclick="uploadFile()" class="primary">อัปโหลดไฟล์</button>
        <progress id="upload-progress" value="0" max="100" style="width: 100%; display: none; margin-top: 10px;"></progress>
        <div id="media-list" style="margin-top: 15px; overflow-y: auto;"></div>
    </div>

    <script type="module">
        import { db, ref, set, update, push, remove, onValue, storage, storageRef, uploadBytesResumable, getDownloadURL, deleteObject } from './firebase-config.js';

        let currentScreen = '01';
        let orientation = 'landscape';
        let globalFont = 'Prompt';
        let layouts = [{ id: 'L1', zones: [] }]; 
        let activeLayoutIndex = 0;

        window.logout = function() { sessionStorage.removeItem('isAdmin'); window.location.href = 'index.html'; }

        window.changeGlobalFont = function() {
            globalFont = document.getElementById('font-select').value;
            const fontUrl = `https://fonts.googleapis.com/css2?family=${globalFont.replace(/ /g, '+')}:wght@300;400;500;700&display=swap`;
            document.getElementById('dynamic-font').href = fontUrl;
            document.body.style.fontFamily = `'${globalFont}', sans-serif`;
        }

        onValue(ref(db, 'media_library'), (snapshot) => {
            const mediaData = snapshot.val();
            const list = document.getElementById('media-list'); list.innerHTML = '';
            if(mediaData) {
                Object.keys(mediaData).forEach(key => {
                    const file = mediaData[key];
                    list.innerHTML += `
                        <div class="media-item">
                            <img src="${file.type === 'image' ? file.url : 'https://cdn-icons-png.flaticon.com/512/2991/2991195.png'}" 
                                 class="media-thumb" draggable="true" 
                                 ondragstart="event.dataTransfer.setData('mediaUrl', '${file.url}'); event.dataTransfer.setData('mediaType', '${file.type}'); event.dataTransfer.setData('mediaName', '${file.name}');">
                            <div class="media-info" title="${file.name}">${file.name}</div>
                            <div class="media-actions"><button onclick="renameMedia('${key}', '${file.name}')">✏️</button><button class="btn-del" onclick="deleteMedia('${key}', '${file.path}')">🗑️</button></div>
                        </div>`;
                });
            } else { list.innerHTML = `<div style="color:#888; font-size:12px; text-align:center;">ยังไม่มีสื่อในระบบ</div>`; }
        });

        window.uploadFile = function() {
            const file = document.getElementById('file-upload').files[0]; if(!file) return alert('กรุณาเลือกไฟล์ก่อน');
            const storagePath = 'signage_media/' + Date.now() + '_' + file.name;
            const uploadTask = uploadBytesResumable(storageRef(storage, storagePath), file);
            const progressBar = document.getElementById('upload-progress'); progressBar.style.display = 'block';
            uploadTask.on('state_changed', 
                (snap) => progressBar.value = (snap.bytesTransferred / snap.totalBytes) * 100, 
                (err) => alert('อัปโหลดล้มเหลว: ' + err), 
                () => { getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                        progressBar.style.display = 'none';
                        push(ref(db, 'media_library'), { name: file.name, url: url, type: file.type.startsWith('video') ? 'video' : 'image', path: storagePath });
                        document.getElementById('file-upload').value = ''; 
                });}
            );
        }
        window.renameMedia = function(k, n) { const n2 = prompt("แก้ไขชื่อไฟล์:", n); if(n2 && n2.trim() !== '') update(ref(db, 'media_library/' + k), { name: n2 }); }
        window.deleteMedia = async function(k, p) { if(confirm("ลบไฟล์นี้ถาวร?")) { try { await deleteObject(storageRef(storage, p)); await remove(ref(db, 'media_library/' + k)); } catch(e){} } }

        window.loadData = function() {
            currentScreen = document.getElementById('screen-select').value;
            if(currentScreen === 'GLOBAL') {
                document.getElementById('btn-normal-mode').style.display = 'none';
                document.getElementById('btn-emergency-mode').style.display = 'block';
                document.body.style.borderTop = '5px solid #d32f2f';
                document.getElementById('mode-title').innerHTML = '🚨 ตั้งค่าหน้าจอฉุกเฉิน';
                onValue(ref(db, 'global_override/config'), (snapshot) => { applyDataToEditor(snapshot.val()); }, { onlyOnce: true });
            } else {
                document.getElementById('btn-normal-mode').style.display = 'block';
                document.getElementById('btn-emergency-mode').style.display = 'none';
                document.body.style.borderTop = '5px solid transparent';
                document.getElementById('mode-title').innerHTML = '1. ตั้งค่าหน้าจอ';
                onValue(ref(db, 'displays/display_' + currentScreen), (snapshot) => { applyDataToEditor(snapshot.val()); }, { onlyOnce: true });
            }
        }

        function applyDataToEditor(data) {
            if(data && data.layouts) { orientation = data.orientation || 'landscape'; layouts = data.layouts; globalFont = data.globalFont || 'Prompt'; } 
            else { layouts = [{ id: 'L1', zones: [] }]; orientation = 'landscape'; globalFont = 'Prompt'; }
            document.getElementById('orientation-select').value = orientation; 
            document.getElementById('font-select').value = globalFont;
            window.changeGlobalFont(); activeLayoutIndex = 0; renderTabs(); window.updateCanvas();
        }

        window.addLayout = function() { layouts.push({ id: 'L' + (layouts.length + 1), zones: [] }); activeLayoutIndex = layouts.length - 1; renderTabs(); renderCanvas(); }
        window.switchLayout = function(index) { activeLayoutIndex = index; renderTabs(); renderCanvas(); }
        function renderTabs() { const c = document.getElementById('tabs-container'); c.innerHTML = ''; layouts.forEach((l, i) => { c.innerHTML += `<div class="tab ${i === activeLayoutIndex ? 'active' : ''}" onclick="switchLayout(${i})">Layout ${i+1}</div>`; }); }

        window.updateCanvas = function() {
            orientation = document.getElementById('orientation-select').value; const canvas = document.getElementById('canvas');
            if(orientation === 'landscape') { canvas.style.width = '800px'; canvas.style.height = '450px'; } else { canvas.style.width = '253px'; canvas.style.height = '450px'; }
            renderCanvas();
        }

        // Functions เพิ่มกรอบรูปแบบต่างๆ
        window.addZone = function() { layouts[activeLayoutIndex].zones.push({ id: Date.now(), top: 10, left: 10, width: 40, height: 40, type: 'media', playlist: [] }); renderCanvas(); }
        window.addClockZone = function() { layouts[activeLayoutIndex].zones.push({ id: Date.now(), top: 10, left: 10, width: 30, height: 20, type: 'clock' }); renderCanvas(); }
        window.addMarqueeZone = function() { layouts[activeLayoutIndex].zones.push({ id: Date.now(), top: 10, left: 10, width: 60, height: 10, type: 'marquee', text: 'พิมพ์ข้อความตัววิ่งที่นี่...', speed: 5 }); renderCanvas(); }
        window.addTextZone = function() { layouts[activeLayoutIndex].zones.push({ id: Date.now(), top: 10, left: 10, width: 30, height: 20, type: 'text', text: 'ข้อความปกติ', fontSize: 40, color: '#ffffff', textAlign: 'center' }); renderCanvas(); }
        
        window.removeZone = function(idx) { layouts[activeLayoutIndex].zones.splice(idx, 1); renderCanvas(); }
        window.removeMediaFromZone = function(zIdx, mIdx) { layouts[activeLayoutIndex].zones[zIdx].playlist.splice(mIdx, 1); renderCanvas(); }
        window.updateZoneProp = function(zoneIndex, prop, value) { layouts[activeLayoutIndex].zones[zoneIndex][prop] = value; }

        function renderCanvas() {
            const canvas = document.getElementById('canvas'); canvas.innerHTML = '';
            const zones = layouts[activeLayoutIndex].zones || [];
            zones.forEach((zone, index) => {
                if (!zone.type) zone.type = 'media';
                const el = document.createElement('div'); el.className = 'zone-box';
                el.style.top = zone.top + '%'; el.style.left = zone.left + '%'; el.style.width = zone.width + '%'; el.style.height = zone.height + '%';
                
                let innerContent = '';
                if (zone.type === 'media') {
                    if (!zone.playlist) zone.playlist = [];
                    el.ondragover = (e) => e.preventDefault();
                    el.ondrop = (e) => { e.preventDefault(); zone.playlist.push({ url: e.dataTransfer.getData('mediaUrl'), type: e.dataTransfer.getData('mediaType'), name: e.dataTransfer.getData('mediaName') || 'ไฟล์สื่อ' }); renderCanvas(); };
                    let bgPreview = '';
                    if(zone.playlist.length > 0) bgPreview = zone.playlist[0].type === 'video' ? `<video src="${zone.playlist[0].url}" autoplay loop muted></video>` : `<img src="${zone.playlist[0].url}">`;
                    let playlistHtml = zone.playlist.map((item, i) => `<div class="zone-media-list-item"><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.type==='video'?'🎥':'🖼️'} ${item.name}</span><button onmousedown="event.stopPropagation(); removeMediaFromZone(${index}, ${i})" title="ลบไฟล์นี้">❌</button></div>`).join('');
                    innerContent = `${bgPreview}<div class="zone-playlist-ui">${zone.playlist.length === 0 ? '<div style="color:#fff; text-align:center; font-size:12px; margin-top:20px;">ลากไฟล์มาวาง</div>' : playlistHtml}</div>`;
                } else if (zone.type === 'clock') { 
                    innerContent = `<div class="clock-preview">⏱️ นาฬิกาดิจิตอล</div>`; 
                } else if (zone.type === 'marquee' || zone.type === 'text') {
                    innerContent = `
                        <div style="padding:10px; width:100%; box-sizing: border-box;">
                            <input type="text" value="${zone.text}" onmousedown="event.stopPropagation();" oninput="updateZoneProp(${index}, 'text', this.value)" style="background:#000; border:1px solid #555; color:#fff; margin-bottom:5px;">
                            ${zone.type === 'text' ? `
                                <div style="display:flex; gap:5px;">
                                    <input type="number" value="${zone.fontSize || 40}" placeholder="px" onmousedown="event.stopPropagation();" oninput="updateZoneProp(${index}, 'fontSize', this.value)" style="width:60px;">
                                    <input type="color" value="${zone.color || '#ffffff'}" onmousedown="event.stopPropagation();" oninput="updateZoneProp(${index}, 'color', this.value)" style="width:40px; padding:0; height:35px;">
                                </div>
                            ` : ''}
                        </div>`;
                }

                let headerIcon = zone.type === 'clock' ? '⏱️ นาฬิกา' : zone.type === 'marquee' ? '🏃 ตัววิ่ง' : zone.type === 'text' ? '📝 ข้อความ' : '🖼️ กรอบสื่อ';
                el.innerHTML = `<div class="zone-header" onmousedown="startDrag(event, ${index})"><span>${headerIcon}</span><button class="btn-delete-zone" onmousedown="event.stopPropagation(); removeZone(${index})" title="ลบกรอบนี้">✖</button></div><div class="zone-content">${innerContent}</div>`;
                el.onmouseup = () => { let newW = Math.round((el.offsetWidth / canvas.offsetWidth) * 100 / 5) * 5; let newH = Math.round((el.offsetHeight / canvas.offsetHeight) * 100 / 5) * 5; zone.width = Math.max(5, Math.min(newW, 100 - zone.left)); zone.height = Math.max(5, Math.min(newH, 100 - zone.top)); renderCanvas(); };
                canvas.appendChild(el);
            });
        }

        window.startDrag = function(e, zoneIndex) {
            e.preventDefault(); const canvas = document.getElementById('canvas'); const zoneData = layouts[activeLayoutIndex].zones[zoneIndex];
            let startY = e.clientY; let startX = e.clientX; let startTop = zoneData.top; let startLeft = zoneData.left;
            function onMouseMove(ev) {
                const dy = ((ev.clientY - startY) / canvas.offsetHeight) * 100; const dx = ((ev.clientX - startX) / canvas.offsetWidth) * 100;
                let newTop = startTop + dy; let newLeft = startLeft + dx;
                newTop = Math.round(newTop / 5) * 5; newLeft = Math.round(newLeft / 5) * 5;
                zoneData.top = Math.max(0, Math.min(newTop, 100 - zoneData.height)); zoneData.left = Math.max(0, Math.min(newLeft, 100 - zoneData.width)); renderCanvas();
            }
            function onMouseUp() { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
            document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
        }

        window.saveDeploy = function() {
            set(ref(db, 'displays/display_' + currentScreen), { orientation, globalFont, layouts }).then(() => alert(`ส่งข้อมูลขึ้น ${currentScreen} สำเร็จ!`));
        }

        window.startEmergency = function() {
            set(ref(db, 'global_override/config'), { orientation, globalFont, layouts }).then(() => { update(ref(db, 'global_override'), { isActive: true }); alert('🚨 ถ่ายทอดสดประกาศฉุกเฉินไปยังทุกจอเรียบร้อยแล้ว!'); });
        }
        
        window.stopEmergency = function() {
            update(ref(db, 'global_override'), { isActive: false }).then(() => alert('🛑 ยกเลิกประกาศเรียบร้อย หน้าจอทั้งหมดกลับสู่สถานะปกติ'));
        }

        window.onload = loadData;
    </script>
</body>
</html>
