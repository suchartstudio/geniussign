<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signage Layout Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .panel { background-color: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .sidebar { width: 350px; flex-shrink: 0; }
        .main-editor { flex-grow: 1; }
        
        h2, h3 { color: #4CAF50; margin-top: 0; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; }
        select, input, button { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #555; background-color: #1e1e1e; color: #fff; box-sizing: border-box; }
        
        button { background-color: #0078D7; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #005A9E; }
        button.danger { background-color: #d32f2f; }
        button.danger:hover { background-color: #9a0007; }

        /* กล่องตั้งค่า Zone */
        .zone-card { background-color: #3d3d3d; padding: 15px; border-radius: 6px; margin-top: 15px; }
        .zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* พื้นที่ Preview */
        .preview-container { 
            background-color: #000; position: relative; margin: 20px auto; border: 2px solid #555;
            transition: all 0.3s ease; overflow: hidden;
        }
        .preview-zone { 
            position: absolute; border: 1px solid rgba(255,255,255,0.5); 
            background-color: rgba(76, 175, 80, 0.2); display: flex; justify-content: center; align-items: center; text-align: center; font-size: 12px; color: #fff;
        }
    </style>
</head>
<body>

    <div class="panel sidebar">
        <h2>Control Panel</h2>
        <label>เลือกจอภาพ (Screen):</label>
        <select id="screen-select" onchange="loadScreenData()">
            <option value="01">Screen 01</option>
            <option value="02">Screen 02</option>
            <option value="03">Screen 03</option>
            <option value="04">Screen 04</option>
            <option value="05">Screen 05</option>
            <option value="06">Screen 06</option>
            <option value="07">Screen 07</option>
            <option value="08">Screen 08</option>
            <option value="09">Screen 09</option>
            <option value="10">Screen 10</option>
        </select>

        <label>การวางแนวจอ (Orientation):</label>
        <select id="orientation-select" onchange="updatePreview()">
            <option value="landscape">แนวนอน (Landscape - 16:9)</option>
            <option value="portrait">แนวตั้ง (Portrait - 9:16)</option>
        </select>

        <button onclick="addZone()" style="background-color: #4CAF50;">+ เพิ่มกรอบ (Add Zone)</button>
        <button onclick="saveToFirebase()" style="padding: 12px; font-size: 16px;">บันทึกและส่งขึ้นจอ (Deploy)</button>
    </div>

    <div class="panel main-editor">
        <h3>Layout Builder</h3>
        
        <div id="preview-box" class="preview-container" style="width: 640px; height: 360px;"></div>

        <div id="zones-container">
            </div>
    </div>

    <script type="module">
        import { db, ref, set, onValue } from './firebase-config.js';

        let currentZones = [];

        // ทำให้ฟังก์ชันเป็น Global เพื่อให้ปุ่ม HTML เรียกใช้ได้
        window.loadScreenData = loadScreenData;
        window.addZone = addZone;
        window.removeZone = removeZone;
        window.updatePreview = updatePreview;
        window.saveToFirebase = saveToFirebase;

        function loadScreenData() {
            const screenId = document.getElementById('screen-select').value;
            const displayRef = ref(db, 'displays/display_' + screenId);
            
            // ดึงข้อมูลครั้งเดียวเพื่อมาแก้ไข
            onValue(displayRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('orientation-select').value = data.orientation || 'landscape';
                    currentZones = data.zones || [];
                } else {
                    // ค่าเริ่มต้นถ้ายังไม่มีข้อมูล
                    document.getElementById('orientation-select').value = 'landscape';
                    currentZones = [];
                }
                renderZonesEditor();
                updatePreview();
            }, { onlyOnce: true });
        }

        function addZone() {
            currentZones.push({
                id: 'zone_' + Date.now(),
                type: 'image',
                content: '',
                top: 0, left: 0, width: 50, height: 50 // ค่าเริ่มต้นเป็น %
            });
            renderZonesEditor();
            updatePreview();
        }

        function removeZone(index) {
            currentZones.splice(index, 1);
            renderZonesEditor();
            updatePreview();
        }

        function renderZonesEditor() {
            const container = document.getElementById('zones-container');
            container.innerHTML = ''; // เคลียร์ของเก่า

            currentZones.forEach((zone, index) => {
                const zoneHTML = `
                    <div class="zone-card">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>กรอบที่ ${index + 1} (${zone.type})</strong>
                            <button class="danger" style="width: auto; margin:0; padding: 4px 8px;" onclick="removeZone(${index})">ลบ</button>
                        </div>
                        <div class="zone-grid">
                            <div>
                                <label>ตำแหน่งแนวตั้ง Top (%)</label>
                                <input type="number" value="${zone.top}" onchange="updateZoneData(${index}, 'top', this.value)">
                            </div>
                            <div>
                                <label>ตำแหน่งแนวนอน Left (%)</label>
                                <input type="number" value="${zone.left}" onchange="updateZoneData(${index}, 'left', this.value)">
                            </div>
                            <div>
                                <label>ความกว้าง Width (%)</label>
                                <input type="number" value="${zone.width}" onchange="updateZoneData(${index}, 'width', this.value)">
                            </div>
                            <div>
                                <label>ความสูง Height (%)</label>
                                <input type="number" value="${zone.height}" onchange="updateZoneData(${index}, 'height', this.value)">
                            </div>
                        </div>
                        <label>ประเภทสื่อ (Media Type)</label>
                        <select onchange="updateZoneData(${index}, 'type', this.value)">
                            <option value="image" ${zone.type === 'image' ? 'selected' : ''}>รูปภาพ (Image URL)</option>
                            <option value="video" ${zone.type === 'video' ? 'selected' : ''}>วิดีโอเล่นวน (Video URL)</option>
                            <option value="marquee" ${zone.type === 'marquee' ? 'selected' : ''}>ข้อความตัววิ่ง (Marquee Text)</option>
                        </select>
                        <label>ข้อมูล (URL ของไฟล์ หรือ ข้อความ)</label>
                        <input type="text" value="${zone.content}" onchange="updateZoneData(${index}, 'content', this.value)" placeholder="ใส่ URL หรือข้อความที่นี่...">
                    </div>
                `;
                container.innerHTML += zoneHTML;
            });
        }

        window.updateZoneData = function(index, field, value) {
            if(['top', 'left', 'width', 'height'].includes(field)) {
                currentZones[index][field] = Number(value);
            } else {
                currentZones[index][field] = value;
            }
            updatePreview();
        }

        function updatePreview() {
            const previewBox = document.getElementById('preview-box');
            const orientation = document.getElementById('orientation-select').value;
            
            // ปรับขนาดกล่อง Preview ตามแนวตั้ง/แนวนอน
            if(orientation === 'landscape') {
                previewBox.style.width = '640px';
                previewBox.style.height = '360px';
            } else {
                previewBox.style.width = '360px';
                previewBox.style.height = '640px';
            }

            // วาดกรอบจำลอง
            previewBox.innerHTML = '';
            currentZones.forEach((zone, index) => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'preview-zone';
                zoneDiv.style.top = zone.top + '%';
                zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%';
                zoneDiv.style.height = zone.height + '%';
                zoneDiv.innerText = `กรอบ ${index + 1}\n(${zone.type})`;
                previewBox.appendChild(zoneDiv);
            });
        }

        function saveToFirebase() {
            const screenId = document.getElementById('screen-select').value;
            const orientation = document.getElementById('orientation-select').value;
            
            const layoutData = {
                orientation: orientation,
                zones: currentZones
            };

            set(ref(db, 'displays/display_' + screenId), layoutData)
                .then(() => alert(`ส่งข้อมูลไปที่ Screen ${screenId} เรียบร้อยแล้ว!`))
                .catch((error) => alert('เกิดข้อผิดพลาด: ' + error));
        }

        // โหลดข้อมูลจอที่ 1 ทันทีเมื่อเปิดหน้า
        window.onload = loadScreenData;
    </script>
</body>
</html>
