<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signage Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #4CAF50; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* Slot-style Dashboard */
        .slot-card {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        /* ป้ายชื่อจอภาพ ออกแบบให้สะอาดตา ไม่มีเส้นขอบหรือเส้นคาดสีเหลือง */
        .slot-name {
            background-color: #3d3d3d;
            padding: 8px 12px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 15px;
            border: none; 
            outline: none;
            display: flex;
            justify-content: space-between;
        }

        .status-dot { width: 12px; height: 12px; background-color: #4CAF50; border-radius: 50%; display: inline-block; }
        .control-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        button {
            background-color: #0078D7; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #005A9E; }
        button.off { background-color: #d32f2f; }
        button.off:hover { background-color: #9a0007; }
        
        input[type="text"] {
            width: 60%; padding: 8px; border-radius: 4px; border: 1px solid #555; background-color: #1e1e1e; color: #fff;
        }
    </style>
</head>
<body>

    <h2>Control Panel - Digital Signage</h2>
    
    <div class="grid-container" id="control-grid">
        <div class="slot-card">
            <div class="slot-name">
                Screen 01
                <span class="status-dot" id="status-01"></span>
            </div>
            
            <div class="control-group">
                <span>AI People Counter:</span>
                <button id="btn-ai-01" onclick="toggleFeature('01', 'aiCounter')">เปิด</button>
            </div>
            <div class="control-group">
                <span>ยอดคนเดินผ่าน:</span>
                <strong id="count-01">0</strong> คน
            </div>

            <hr style="border-color: #444; margin: 15px 0;">

            <div class="control-group">
                <span>ตัววิ่ง (Marquee):</span>
                <button id="btn-mq-01" onclick="toggleFeature('01', 'marquee')">เปิด</button>
            </div>
            <div class="control-group">
                <input type="text" id="text-mq-01" placeholder="พิมพ์ข้อความตัววิ่ง...">
                <button onclick="updateMarqueeText('01')">ส่งข้อความ</button>
            </div>
        </div>
        </div>

    <script type="module">
        import { db, ref, onValue, update } from './firebase-config.js';

        // ฟังก์ชันรับการเปลี่ยนแปลงจาก Firebase มาแสดงบน Control
        function listenToDisplay(displayId) {
            const displayRef = ref(db, 'displays/display_' + displayId);
            onValue(displayRef, (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    // อัปเดตปุ่ม AI
                    const aiBtn = document.getElementById(`btn-ai-${displayId}`);
                    aiBtn.textContent = data.aiCounter.enabled ? "ปิด" : "เปิด";
                    aiBtn.className = data.aiCounter.enabled ? "" : "off";
                    document.getElementById(`count-${displayId}`).innerText = data.aiCounter.currentCount;

                    // อัปเดตปุ่ม Marquee
                    const mqBtn = document.getElementById(`btn-mq-${displayId}`);
                    mqBtn.textContent = data.marquee.enabled ? "ปิด" : "เปิด";
                    mqBtn.className = data.marquee.enabled ? "" : "off";
                }
            });
        }

        // ทำให้ใช้งานฟังก์ชันใน HTML แบบ onclick ได้
        window.toggleFeature = function(displayId, feature) {
            const featurePath = feature === 'aiCounter' ? 'aiCounter/enabled' : 'marquee/enabled';
            const stateRef = ref(db, `displays/display_${displayId}/${feature}/enabled`);
            
            // อ่านค่าปัจจุบันแล้วสลับค่า (Toggle)
            onValue(stateRef, (snapshot) => {
                const currentState = snapshot.val();
                const updates = {};
                updates[`displays/display_${displayId}/${feature}/enabled`] = !currentState;
                update(ref(db), updates);
            }, { onlyOnce: true });
        }

        window.updateMarqueeText = function(displayId) {
            const textInput = document.getElementById(`text-mq-${displayId}`).value;
            const updates = {};
            updates[`displays/display_${displayId}/marquee/text`] = textInput;
            update(ref(db), updates);
        }

        // เริ่มดึงข้อมูลจอ 01
        listenToDisplay('01');
    </script>
</body>
</html>
