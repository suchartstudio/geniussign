<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Player</title>
    <link id="dynamic-font" href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Prompt', sans-serif; transition: font-family 0.3s; }
        #player-container { position: relative; width: 100%; height: 100%; }
        .zone-element { position: absolute; overflow: hidden; background: transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .zone-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0; transition: opacity 1s ease-in-out; }
        .zone-media.active { opacity: 1; z-index: 2; }
        .zone-media.fade-out { opacity: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="player-container">
        <h1 style="color:#555; text-align:center; padding-top: 40vh;">Connecting to Firebase...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue, set, onDisconnect } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const DISPLAY_ID = urlParams.get('screen') || '01'; 
        
        const connectedRef = ref(db, '.info/connected');
        const presenceRef = ref(db, 'displays/display_' + DISPLAY_ID + '/presence');
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) { onDisconnect(presenceRef).set('offline').then(() => { set(presenceRef, 'online'); }); }
        });
        
        const container = document.getElementById('player-container');
        let normalLayouts = []; let normalFont = 'Prompt'; let normalOrientation = 'landscape';
        let activeLayouts = []; let isEmergencyMode = false;
        let currentLayoutIndex = 0; let zoneCleanups = []; let fallbackTimer = null; 

        // 1. รับการตั้งค่าปกติของจอ
        onValue(ref(db, 'displays/display_' + DISPLAY_ID), (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.layouts) return;
            normalFont = data.globalFont || 'Prompt';
            normalOrientation = data.orientation || 'landscape';
            normalLayouts = data.layouts;
            
            if (!isEmergencyMode) {
                applyFont(normalFont);
                activeLayouts = normalLayouts; currentLayoutIndex = 0; playCurrentLayout();
            }
        });

        // 2. รับการตั้งค่าโหมดฉุกเฉิน
        onValue(ref(db, 'global_override'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.isActive) {
                isEmergencyMode = true;
                if (data.config) {
                    applyFont(data.config.globalFont || 'Prompt');
                    const overrideConfig = data.config[normalOrientation] || data.config.landscape;
                    activeLayouts = overrideConfig || []; currentLayoutIndex = 0; playCurrentLayout();
                }
            } else {
                if (isEmergencyMode) {
                    isEmergencyMode = false;
                    applyFont(normalFont);
                    activeLayouts = normalLayouts; currentLayoutIndex = 0; playCurrentLayout();
                }
            }
        });

        function applyFont(fontName) {
            const fontUrl = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}:wght@300;400;500;700&display=swap`;
            document.getElementById('dynamic-font').href = fontUrl;
            document.body.style.fontFamily = `'${fontName}', sans-serif`;
        }

        function playNextLayout() { currentLayoutIndex = (currentLayoutIndex + 1) % activeLayouts.length; playCurrentLayout(); }

        function playCurrentLayout() {
            if(!activeLayouts || activeLayouts.length === 0) return;
            if(fallbackTimer) clearTimeout(fallbackTimer);
            
            const layout = activeLayouts[currentLayoutIndex];
            zoneCleanups.forEach(cleanupFn => cleanupFn());
            zoneCleanups = []; container.innerHTML = ''; 

            const zones = layout.zones || [];
            const mediaZones = zones.filter(z => (!z.type || z.type === 'media') && z.playlist && z.playlist.length > 0);
            const totalMediaZones = mediaZones.length;
            let zonesCompletedCount = 0; let isLayoutFinished = false;

            if(totalMediaZones === 0) { fallbackTimer = setTimeout(playNextLayout, 15000); }

            function onZoneLoopComplete() {
                if(isLayoutFinished) return;
                zonesCompletedCount++;
                if(zonesCompletedCount >= totalMediaZones && totalMediaZones > 0) {
                    isLayoutFinished = true; playNextLayout();
                }
            }

            zones.forEach(zone => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element';
                zoneDiv.style.top = zone.top + '%'; zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%'; zoneDiv.style.height = zone.height + '%';
                container.appendChild(zoneDiv);

                if (zone.type === 'clock') {
                    zoneDiv.innerHTML = `<div style="width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;"><div class="c-time" style="font-size:${(zone.fontSize || 40)*2}px; color:${zone.color || '#00bcd4'}; font-weight:700; line-height:1; text-shadow:0 0 10px rgba(0,0,0,0.8);">00:00:00</div><div class="c-date" style="font-size:${zone.fontSize || 40}px; color:#fff; text-shadow:0 0 5px #000;">วันที่</div></div>`;
                    const tEl = zoneDiv.querySelector('.c-time'); const dEl = zoneDiv.querySelector('.c-date');
                    const uc = () => {
                        const now = new Date();
                        tEl.innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        dEl.innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    };
                    uc(); const timer = setInterval(uc, 1000); zoneCleanups.push(() => clearInterval(timer));
                } 
                else if (zone.type === 'countdown') {
                    const target = new Date(zone.targetTime || Date.now()).getTime();
                    zoneDiv.innerHTML = `<div style="color:${zone.color || '#ff9800'}; font-size:${zone.fontSize || 40}px; font-weight:bold; width:100%; height:100%; display:flex; justify-content:center; align-items:center; text-align:center; text-shadow:0 0 10px #000;"></div>`;
                    const tEl = zoneDiv.firstElementChild;
                    const uc = () => {
                        const diff = target - Date.now();
                        if(diff <= 0) { tEl.innerText = "00:00:00"; return; }
                        const d = Math.floor(diff / (1000*60*60*24)); const h = Math.floor((diff / (1000*60*60)) % 24); const m = Math.floor((diff / 1000 / 60) % 60); const s = Math.floor((diff / 1000) % 60);
                        tEl.innerText = (d > 0 ? d + " วัน " : "") + String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                    };
                    uc(); const timer = setInterval(uc, 1000); zoneCleanups.push(() => clearInterval(timer));
                }
                else if (zone.type === 'stopwatch') {
                    const start = zone.startTime || Date.now();
                    zoneDiv.innerHTML = `<div style="color:${zone.color || '#4caf50'}; font-size:${zone.fontSize || 40}px; font-weight:bold; width:100%; height:100%; display:flex; justify-content:center; align-items:center; text-align:center; text-shadow:0 0 10px #000;"></div>`;
                    const tEl = zoneDiv.firstElementChild;
                    const uc = () => {
                        const diff = Date.now() - start;
                        const h = Math.floor((diff / (1000*60*60))); const m = Math.floor((diff / 1000 / 60) % 60); const s = Math.floor((diff / 1000) % 60);
                        tEl.innerText = String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                    };
                    uc(); const timer = setInterval(uc, 1000); zoneCleanups.push(() => clearInterval(timer));
                }
                else if (zone.type === 'marquee') {
                    zoneDiv.innerHTML = `<div style="width:100%; height:100%; display:flex; align-items:center; overflow:hidden; white-space:nowrap; color:${zone.color || '#fff'}; font-size:${zone.fontSize || 40}px; background:rgba(0,0,0,0.5);"><marquee scrollamount="${zone.speed || 5}">${zone.text || ''}</marquee></div>`;
                } 
                else if (zone.type === 'text') {
                    zoneDiv.innerHTML = `<div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:${zone.color || '#fff'}; font-size:${zone.fontSize || 40}px; text-align:center; padding:10px; box-sizing:border-box; word-break:break-word; text-shadow:0 0 5px #000;">${zone.text || ''}</div>`;
                } 
                else if (!zone.type || zone.type === 'media') {
                    if (zone.playlist && zone.playlist.length > 0) {
                        zoneDiv.style.background = '#000';
                        const cleanup = playZonePlaylist(zoneDiv, zone.playlist, onZoneLoopComplete);
                        zoneCleanups.push(cleanup);
                    } else { onZoneLoopComplete(); }
                }
            });
        }

        function playZonePlaylist(zoneDiv, playlist, onLoopComplete) {
            let currentIndex = 0; let currentElement = null; let zoneTimer = null;
            function showNextMedia() {
                if (currentElement) {
                    currentElement.classList.remove('active'); currentElement.classList.add('fade-out');
                    setTimeout((el) => { if(el && el.parentNode) el.parentNode.removeChild(el); }, 1000, currentElement);
                }
                const item = playlist[currentIndex]; let nextElement;

                if (item.type === 'video') {
                    nextElement = document.createElement('video');
                    nextElement.src = item.url; nextElement.className = 'zone-media';
                    nextElement.autoplay = true; nextElement.muted = true; nextElement.playsInline = true;
                    nextElement.onended = proceedToNext;
                    nextElement.onerror = () => { zoneTimer = setTimeout(proceedToNext, 1000); };
                } else {
                    nextElement = document.createElement('img');
                    nextElement.src = item.url; nextElement.className = 'zone-media';
                    
                    // ดึงเวลาการแสดงผลที่ผู้ใช้ตั้งค่าไว้ (หากไม่มี จะใช้ค่าเริ่มต้น 8 วินาที)
                    const imageDuration = (item.duration || 8) * 1000;
                    zoneTimer = setTimeout(proceedToNext, imageDuration);
                }

                zoneDiv.appendChild(nextElement);
                setTimeout(() => { nextElement.classList.add('active'); }, 50);
                currentElement = nextElement;
            }

            function proceedToNext() {
                currentIndex++;
                if (currentIndex >= playlist.length) { currentIndex = 0; onLoopComplete(); }
                showNextMedia();
            }

            showNextMedia();
            return () => { if(zoneTimer) clearTimeout(zoneTimer); };
        }
    </script>
</body>
</html>
