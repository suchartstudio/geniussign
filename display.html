<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        #player-container { position: relative; width: 100%; height: 100%; }
        
        .zone-element { 
            position: absolute; overflow: hidden; background: #000; 
        }
        
        /* สื่อแสดงแบบ Stretch ยืดให้เต็มกรอบ */
        .zone-media { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; object-fit: fill; 
            opacity: 0;
            transition: opacity 1s ease-in-out; 
        }
        
        .zone-media.active { opacity: 1; z-index: 2; }
        .zone-media.fade-out { opacity: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="player-container">
        <h1 style="color:#555; text-align:center; padding-top: 40vh; font-family: sans-serif;">Connecting to Firebase...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        // *** กำหนดเลขจอที่ต้องการเปิด (01 - 10) ***
        const DISPLAY_ID = '01'; 
        
        const container = document.getElementById('player-container');
        let layouts = [];
        let currentLayoutIndex = 0;
        let zoneCleanups = []; 
        
        // ตัวจับเวลาสำรอง เผื่อ Layout นั้นเป็นหน้าจอว่างๆ จะได้ข้ามได้
        let fallbackTimer = null; 

        onValue(ref(db, 'displays/display_' + DISPLAY_ID), (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.layouts) return;

            layouts = data.layouts;
            currentLayoutIndex = 0;
            playCurrentLayout();
        });

        function playNextLayout() {
            currentLayoutIndex = (currentLayoutIndex + 1) % layouts.length;
            playCurrentLayout();
        }

        function playCurrentLayout() {
            if(layouts.length === 0) return;
            if(fallbackTimer) clearTimeout(fallbackTimer);
            
            const layout = layouts[currentLayoutIndex];
            
            // ล้างหน้าเก่า และ Timers เก่าออกให้หมด
            zoneCleanups.forEach(cleanupFn => cleanupFn());
            zoneCleanups = [];
            container.innerHTML = ''; 

            const zones = layout.zones || [];
            const totalZones = zones.length;
            let zonesCompletedCount = 0;
            let isLayoutFinished = false;

            // หากเป็น Layout ว่างๆ (ไม่มีกรอบเลย) ให้รอ 10 วิแล้วเปลี่ยน
            if(totalZones === 0) {
                fallbackTimer = setTimeout(playNextLayout, 10000);
                return;
            }

            // ฟังก์ชันรับสัญญาณเมื่อ Zone ใดๆ เล่นครบ 1 รอบแล้ว
            function onZoneLoopComplete() {
                if(isLayoutFinished) return;
                
                zonesCompletedCount++;
                // ถ้ายอดรวม Zone ที่เล่นจบ เท่ากับ Zone ทั้งหมดในหน้าจอ = อนุญาตให้เปลี่ยน Layout ได้
                if(zonesCompletedCount >= totalZones) {
                    isLayoutFinished = true;
                    playNextLayout();
                }
            }

            zones.forEach(zone => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element';
                zoneDiv.style.top = zone.top + '%';
                zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%';
                zoneDiv.style.height = zone.height + '%';
                container.appendChild(zoneDiv);

                if (zone.playlist && zone.playlist.length > 0) {
                    // ส่ง Callback ไปให้ Zone เพื่อแจ้งเตือนตอนเล่นครบ Loop
                    const cleanup = playZonePlaylist(zoneDiv, zone.playlist, onZoneLoopComplete);
                    zoneCleanups.push(cleanup);
                } else {
                    // ถ้ากรอบนี้ไม่มีสื่อ ให้ถือว่าเล่นจบแล้วทันที
                    onZoneLoopComplete();
                }
            });
        }

        function playZonePlaylist(zoneDiv, playlist, onLoopComplete) {
            let currentIndex = 0;
            let currentElement = null;
            let zoneTimer = null;

            function showNextMedia() {
                if (currentElement) {
                    currentElement.classList.remove('active');
                    currentElement.classList.add('fade-out');
                    setTimeout((el) => { if(el && el.parentNode) el.parentNode.removeChild(el); }, 1000, currentElement);
                }

                const item = playlist[currentIndex];
                let nextElement;

                if (item.type === 'video') {
                    nextElement = document.createElement('video');
                    nextElement.src = item.url;
                    nextElement.className = 'zone-media';
                    nextElement.autoplay = true;
                    nextElement.muted = true;
                    nextElement.playsInline = true;
                    
                    nextElement.onended = proceedToNext;
                    nextElement.onerror = () => { zoneTimer = setTimeout(proceedToNext, 1000); };
                } else {
                    nextElement = document.createElement('img');
                    nextElement.src = item.url;
                    nextElement.className = 'zone-media';
                    
                    // ภาพนิ่งแสดง 8 วินาที
                    zoneTimer = setTimeout(proceedToNext, 8000);
                }

                zoneDiv.appendChild(nextElement);
                setTimeout(() => { nextElement.classList.add('active'); }, 50);
                currentElement = nextElement;
            }

            // ฟังก์ชันจัดการการเลื่อนไปไฟล์ถัดไป และเช็ครอบ (Loop)
            function proceedToNext() {
                currentIndex++;
                // ถ้าไฟล์หมดแล้ว (ครบ 1 รอบของกรอบนี้)
                if (currentIndex >= playlist.length) {
                    currentIndex = 0;
                    onLoopComplete(); // แจ้งเตือน Layout ตัวแม่ว่า "กรอบฉันเล่นจบแล้วนะ"
                }
                showNextMedia();
            }

            showNextMedia();

            return () => {
                if(zoneTimer) clearTimeout(zoneTimer);
            };
        }
    </script>
</body>
</html>
