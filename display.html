<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        #player-container { position: relative; width: 100%; height: 100%; }
        
        .zone-element { 
            position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center; 
            background: #000; /* พื้นหลังสีดำในกรณีที่ภาพไม่ได้สัดส่วนพอดีกรอบ */
        }
        
        /* หัวใจสำคัญ: ทำให้ภาพและวิดีโอ พอดีกับกรอบ (ไม่ตัดขอบ ไม่ยืด) */
        .zone-media { width: 100%; height: 100%; object-fit: contain; }
        
        .fade-in { animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="player-container">
        <h1 style="color:#555; text-align:center; padding-top: 40vh; font-family: sans-serif;">Connecting to Firebase...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        // *** กำหนดเลขจอที่ต้องการเปิด (01 - 10) ***
        const DISPLAY_ID = '01'; 
        
        const container = document.getElementById('player-container');
        let layouts = [];
        let currentLayoutIndex = 0;
        let loopTimer = null;

        onValue(ref(db, 'displays/display_' + DISPLAY_ID), (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.layouts) return;

            layouts = data.layouts;
            currentLayoutIndex = 0;
            playCurrentLayout();
        });

        function playCurrentLayout() {
            if(layouts.length === 0) return;
            if(loopTimer) clearTimeout(loopTimer);

            const layout = layouts[currentLayoutIndex];
            renderLayout(layout);
            
            const durationMs = (layout.duration || 10) * 1000;
            loopTimer = setTimeout(() => {
                currentLayoutIndex = (currentLayoutIndex + 1) % layouts.length;
                playCurrentLayout();
            }, durationMs);
        }

        function renderLayout(layout) {
            container.innerHTML = ''; 
            
            const zones = layout.zones || [];
            zones.forEach(zone => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element fade-in';
                zoneDiv.style.top = zone.top + '%';
                zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%';
                zoneDiv.style.height = zone.height + '%';

                if(zone.url) {
                    if (zone.type === 'video') {
                        zoneDiv.innerHTML = `<video src="${zone.url}" class="zone-media" autoplay loop muted playsinline></video>`;
                    } else {
                        zoneDiv.innerHTML = `<img src="${zone.url}" class="zone-media">`;
                    }
                }
                
                container.appendChild(zoneDiv);
            });
        }
    </script>
</body>
</html>
