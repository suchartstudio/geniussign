<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Player</title>
    <link id="dynamic-font" href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Prompt', sans-serif; transition: font-family 0.3s; }
        #player-container { position: relative; width: 100%; height: 100%; }
        .zone-element { position: absolute; overflow: hidden; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .zone-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0; transition: opacity 1s ease-in-out; }
        .zone-media.active { opacity: 1; z-index: 2; }
        .zone-media.fade-out { opacity: 0; z-index: 1; }
        .clock-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0a0a0a; color: #fff; z-index: 5; text-align: center; }
        .clock-time { font-size: 15vh; font-weight: 700; line-height: 1; margin-bottom: 2vh; text-shadow: 0 0 20px rgba(0, 188, 212, 0.5); color: #00bcd4; }
        .clock-date { font-size: 5vh; font-weight: 400; color: #ccc; }
    </style>
</head>
<body>

    <div id="player-container">
        <h1 style="color:#555; text-align:center; padding-top: 40vh;">Connecting to Firebase...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue, set, onDisconnect } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const DISPLAY_ID = urlParams.get('screen') || '01'; 
        
        // Presence System
        const connectedRef = ref(db, '.info/connected');
        const presenceRef = ref(db, 'displays/display_' + DISPLAY_ID + '/presence');
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) { onDisconnect(presenceRef).set('offline').then(() => { set(presenceRef, 'online'); }); }
        });
        
        const container = document.getElementById('player-container');
        
        // แยกตัวแปรเก็บ Layout 2 ชุด (ปกติ กับ ฉุกเฉิน)
        let normalLayouts = [];
        let normalFont = 'Prompt';
        
        // ตัวแปรควบคุมระบบเครื่องเล่น
        let activeLayouts = [];
        let isEmergencyMode = false;
        let currentLayoutIndex = 0;
        let zoneCleanups = []; 
        let fallbackTimer = null; 

        // 1. ตรวจสอบการตั้งค่าปกติของจอนี้
        onValue(ref(db, 'displays/display_' + DISPLAY_ID), (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.layouts) return;

            normalFont = data.globalFont || 'Prompt';
            normalLayouts = data.layouts;
            
            // ถ้าไม่ได้อยู่ในโหมดฉุกเฉิน ให้ดึงข้อมูลปกติไปรัน
            if (!isEmergencyMode) {
                applyFont(normalFont);
                activeLayouts = normalLayouts;
                currentLayoutIndex = 0;
                playCurrentLayout();
            }
        });

        // 2. ตรวจสอบสัญญาณฉุกเฉิน (Global Override) แบบ Real-time
        onValue(ref(db, 'global_override'), (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.isActive) {
                isEmergencyMode = true;
                if (data.config && data.config.layouts) {
                    // เปลี่ยนฟอนต์ตามประกาศฉุกเฉิน
                    applyFont(data.config.globalFont || 'Prompt');
                    // สลับ Layout ไปใช้ของส่วนกลาง
                    activeLayouts = data.config.layouts;
                    currentLayoutIndex = 0;
                    playCurrentLayout();
                }
            } else {
                // ถ้ายกเลิกโหมดฉุกเฉิน และเคยอยู่ในโหมดนี้มาก่อน
                if (isEmergencyMode) {
                    isEmergencyMode = false;
                    // คืนค่าฟอนต์และ Layout กลับเป็นของเดิม
                    applyFont(normalFont);
                    activeLayouts = normalLayouts;
                    currentLayoutIndex = 0;
                    playCurrentLayout();
                }
            }
        });

        function applyFont(fontName) {
            const fontUrl = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}:wght@300;400;500;700&display=swap`;
            document.getElementById('dynamic-font').href = fontUrl;
            document.body.style.fontFamily = `'${fontName}', sans-serif`;
        }

        // ระบบ Player (ทำงานร่วมกับ activeLayouts)
        function playNextLayout() { currentLayoutIndex = (currentLayoutIndex + 1) % activeLayouts.length; playCurrentLayout(); }

        function playCurrentLayout() {
            if(activeLayouts.length === 0) return;
            if(fallbackTimer) clearTimeout(fallbackTimer);
            
            const layout = activeLayouts[currentLayoutIndex];
            
            // ล้างหน้าจอเก่า ตัดวิดีโอ/เสียงเดิมทิ้งทั้งหมดทันที
            zoneCleanups.forEach(cleanupFn => cleanupFn());
            zoneCleanups = [];
            container.innerHTML = ''; 

            const zones = layout.zones || [];
            const mediaZones = zones.filter(z => z.type !== 'clock' && z.playlist && z.playlist.length > 0);
            const totalMediaZones = mediaZones.length;
            let zonesCompletedCount = 0;
            let isLayoutFinished = false;

            if(totalMediaZones === 0) { fallbackTimer = setTimeout(playNextLayout, 15000); }

            function onZoneLoopComplete() {
                if(isLayoutFinished) return;
                zonesCompletedCount++;
                if(zonesCompletedCount >= totalMediaZones && totalMediaZones > 0) {
                    isLayoutFinished = true;
                    playNextLayout();
                }
            }

            zones.forEach(zone => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element';
                zoneDiv.style.top = zone.top + '%'; zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%'; zoneDiv.style.height = zone.height + '%';
                container.appendChild(zoneDiv);

                if (zone.type === 'clock') {
                    const cleanup = renderClockZone(zoneDiv);
                    zoneCleanups.push(cleanup);
                } else if (zone.playlist && zone.playlist.length > 0) {
                    const cleanup = playZonePlaylist(zoneDiv, zone.playlist, onZoneLoopComplete);
                    zoneCleanups.push(cleanup);
                }
            });
        }

        function renderClockZone(zoneDiv) {
            const clockHtml = `<div class="clock-container"><div class="clock-time">00:00:00</div><div class="clock-date">วัน เดือน ปี</div></div>`;
            zoneDiv.innerHTML = clockHtml;
            const timeEl = zoneDiv.querySelector('.clock-time');
            const dateEl = zoneDiv.querySelector('.clock-date');
            
            const updateClock = () => {
                const now = new Date();
                timeEl.innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                dateEl.innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            };
            updateClock();
            const timer = setInterval(updateClock, 1000);
            return () => clearInterval(timer);
        }

        function playZonePlaylist(zoneDiv, playlist, onLoopComplete) {
            let currentIndex = 0; let currentElement = null; let zoneTimer = null;

            function showNextMedia() {
                if (currentElement) {
                    currentElement.classList.remove('active'); currentElement.classList.add('fade-out');
                    setTimeout((el) => { if(el && el.parentNode) el.parentNode.removeChild(el); }, 1000, currentElement);
                }
                const item = playlist[currentIndex];
                let nextElement;

                if (item.type === 'video') {
                    nextElement = document.createElement('video');
                    nextElement.src = item.url; nextElement.className = 'zone-media';
                    nextElement.autoplay = true; nextElement.muted = true; nextElement.playsInline = true;
                    nextElement.onended = proceedToNext;
                    nextElement.onerror = () => { zoneTimer = setTimeout(proceedToNext, 1000); };
                } else {
                    nextElement = document.createElement('img');
                    nextElement.src = item.url; nextElement.className = 'zone-media';
                    zoneTimer = setTimeout(proceedToNext, 8000);
                }

                zoneDiv.appendChild(nextElement);
                setTimeout(() => { nextElement.classList.add('active'); }, 50);
                currentElement = nextElement;
            }

            function proceedToNext() {
                currentIndex++;
                if (currentIndex >= playlist.length) { currentIndex = 0; onLoopComplete(); }
                showNextMedia();
            }

            showNextMedia();
            return () => { if(zoneTimer) clearTimeout(zoneTimer); };
        }
    </script>
</body>
</html>
