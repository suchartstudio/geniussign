<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        #player-container { position: relative; width: 100%; height: 100%; }
        
        .zone-element { 
            position: absolute; overflow: hidden; background: #000; 
        }
        
        /* ตั้งค่าซ้อนทับเพื่อทำเอฟเฟกต์เฟดสลับสื่อ */
        .zone-media { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; object-fit: contain; 
            opacity: 0; /* ซ่อนไว้เป็นค่าเริ่มต้น */
            transition: opacity 1s ease-in-out; /* ระยะเวลาเฟด 1 วินาที */
        }
        
        /* คลาสสำหรับเรียกใช้เฟดภาพเข้า-ออก */
        .zone-media.active { opacity: 1; z-index: 2; }
        .zone-media.fade-out { opacity: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="player-container">
        <h1 style="color:#555; text-align:center; padding-top: 40vh; font-family: sans-serif;">Connecting to Firebase...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        // *** กำหนดเลขจอที่ต้องการเปิด (01 - 10) ***
        const DISPLAY_ID = '01'; 
        
        const container = document.getElementById('player-container');
        let layouts = [];
        let currentLayoutIndex = 0;
        let loopTimer = null;
        let zoneCleanups = []; // สำหรับจัดการล้าง Timeout ของแต่ละ Zone เมื่อเปลี่ยน Layout

        onValue(ref(db, 'displays/display_' + DISPLAY_ID), (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.layouts) return;

            layouts = data.layouts;
            currentLayoutIndex = 0;
            playCurrentLayout();
        });

        function playCurrentLayout() {
            if(layouts.length === 0) return;
            if(loopTimer) clearTimeout(loopTimer);

            const layout = layouts[currentLayoutIndex];
            renderLayout(layout);
            
            // ใช้เวลา Layout ลูปรวม
            const durationMs = (layout.duration || 30) * 1000;
            loopTimer = setTimeout(() => {
                currentLayoutIndex = (currentLayoutIndex + 1) % layouts.length;
                playCurrentLayout();
            }, durationMs);
        }

        // ฟังก์ชันจัดการ Playlist ภายในแต่ละ Zone
        function playZonePlaylist(zoneDiv, playlist) {
            if(!playlist || playlist.length === 0) return () => {};
            
            let currentIndex = 0;
            let currentElement = null;
            let zoneTimer = null;

            function showNextMedia() {
                // ถ้ามีสื่อเก่ากำลังแสดง ให้ค่อยๆ เฟดออก (1 วิ) แล้วลบทิ้ง
                if (currentElement) {
                    currentElement.classList.remove('active');
                    currentElement.classList.add('fade-out');
                    setTimeout((el) => { if(el.parentNode) el.parentNode.removeChild(el); }, 1000, currentElement);
                }

                const item = playlist[currentIndex];
                let nextElement;

                if (item.type === 'video') {
                    nextElement = document.createElement('video');
                    nextElement.src = item.url;
                    nextElement.className = 'zone-media';
                    nextElement.autoplay = true;
                    nextElement.muted = true;
                    nextElement.playsInline = true;
                    
                    // เมื่อวิดีโอเล่นจบ ให้สลับไปไฟล์ถัดไปทันที
                    nextElement.onended = () => {
                        currentIndex = (currentIndex + 1) % playlist.length;
                        showNextMedia();
                    };
                    
                    // กันเหนียวกรณีโหลดวิดีโอไม่ขึ้น ให้ข้ามไปภาพต่อไป
                    nextElement.onerror = () => {
                        currentIndex = (currentIndex + 1) % playlist.length;
                        zoneTimer = setTimeout(showNextMedia, 1000);
                    };
                } else {
                    // หากเป็นภาพนิ่ง
                    nextElement = document.createElement('img');
                    nextElement.src = item.url;
                    nextElement.className = 'zone-media';
                    
                    // ตั้งเวลาหน่วง 8 วินาที (8000ms) แล้วเปลี่ยนภาพ
                    zoneTimer = setTimeout(() => {
                        currentIndex = (currentIndex + 1) % playlist.length;
                        showNextMedia();
                    }, 8000);
                }

                zoneDiv.appendChild(nextElement);
                
                // ใช้ Timeout เล็กน้อยเพื่อให้ CSS Transition เฟดเข้า (Fade-in) ทำงาน
                setTimeout(() => { nextElement.classList.add('active'); }, 50);
                
                currentElement = nextElement;
            }

            // เริ่มเล่นไฟล์แรก
            showNextMedia();

            // ส่งฟังก์ชัน Cleanup คืนกลับไป เพื่อให้ระบบล้างเวลาออกเมื่อต้องสลับหน้า Layout ใหญ่
            return () => {
                if(zoneTimer) clearTimeout(zoneTimer);
            };
        }

        function renderLayout(layout) {
            // ล้างรอบการเล่น (Timeouts) ของ Zone เก่าๆ ก่อนเปลี่ยนหน้า
            zoneCleanups.forEach(cleanupFn => cleanupFn());
            zoneCleanups = [];
            container.innerHTML = ''; 
            
            const zones = layout.zones || [];
            zones.forEach(zone => {
                // แปลงข้อมูลเก่า (ถ้ามี) ให้เป็นรูปแบบ Playlist
                if(zone.url && !zone.playlist) {
                    zone.playlist = [{ url: zone.url, type: zone.type }];
                }

                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element';
                zoneDiv.style.top = zone.top + '%';
                zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%';
                zoneDiv.style.height = zone.height + '%';
                
                container.appendChild(zoneDiv);

                // เริ่มกระบวนการเล่นสลับไฟล์ใน Zone นี้
                if (zone.playlist && zone.playlist.length > 0) {
                    const cleanup = playZonePlaylist(zoneDiv, zone.playlist);
                    zoneCleanups.push(cleanup);
                }
            });
        }
    </script>
</body>
</html>
