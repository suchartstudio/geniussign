<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Digital Signage Display</title>
    <style>
        /* รีเซ็ตหน้าจอให้เต็มพื้นที่ ไม่มีขอบขาว */
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: sans-serif; }
        
        #screen-container { position: relative; width: 100%; height: 100%; }

        /* คลาสพื้นฐานสำหรับทุก Zone */
        .zone-element { position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* สื่อเต็มพื้นที่ Zone */
        .zone-media { width: 100%; height: 100%; object-fit: cover; }
        
        /* CSS สำหรับข้อความตัววิ่ง */
        .marquee-container { background-color: #002244; color: #FFF; width: 100%; height: 100%; display: flex; align-items: center; white-space: nowrap; overflow: hidden; }
        .marquee-text { font-size: 4vh; padding-left: 100%; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="screen-container">
        <h1 style="color:#333; text-align:center; padding-top: 40vh;">รอรับข้อมูลจาก Control Panel...</h1>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        // *** เปลี่ยนตัวเลขนี้ตามเครื่องที่จะใช้แสดงผล (01 ถึง 10) ***
        const DISPLAY_ID = '01'; 
        
        const screenContainer = document.getElementById('screen-container');

        const displayRef = ref(db, 'displays/display_' + DISPLAY_ID);
        onValue(displayRef, (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // 1. จัดการการวางแนวจอ (ถ้าต้องการบังคับผ่าน CSS เพิ่มเติม สามารถเขียนเงื่อนไขที่นี่)
            // โดยปกติ browser จะ render ตาม resolution จอจริงอยู่แล้ว

            // 2. ล้างหน้าจอเก่า
            screenContainer.innerHTML = '';

            // 3. วาด Zones ใหม่
            const zones = data.zones || [];
            zones.forEach(zone => {
                const zoneDiv = document.createElement('div');
                zoneDiv.className = 'zone-element';
                zoneDiv.style.top = zone.top + '%';
                zoneDiv.style.left = zone.left + '%';
                zoneDiv.style.width = zone.width + '%';
                zoneDiv.style.height = zone.height + '%';

                // กำหนดประเภทการแสดงผล
                if (zone.type === 'image') {
                    zoneDiv.innerHTML = `<img src="${zone.content}" class="zone-media" alt="Image Media">`;
                } 
                else if (zone.type === 'video') {
                    zoneDiv.innerHTML = `<video src="${zone.content}" class="zone-media" autoplay loop muted playsinline></video>`;
                } 
                else if (zone.type === 'marquee') {
                    zoneDiv.innerHTML = `
                        <div class="marquee-container">
                            <div class="marquee-text">${zone.content}</div>
                        </div>`;
                }

                screenContainer.appendChild(zoneDiv);
            });
        });
    </script>
</body>
</html>
